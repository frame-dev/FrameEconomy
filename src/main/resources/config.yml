    failed: '&cFailed to check for updates on spigotmc.org'
  reload:
    success: '&aConfig reloaded!'
  balance:
    own: '&aYour money: &6{amount}{currency}'
    other: '&aMoney from &6{player} &ais &6{amount}{currency}'
    top-entry: '&a{position}. [&6{player} &b: {amount}&a]'
  pay:
    usage: '&cPlease use &6/pay <Amount> <PlayerName> &cor &6/pay <Amount> <PlayerName> <Percent>&c!'
    sent: '&aYou gave &6{player} {amount}{currency}'
    received: '&aYou got &6{amount}{currency} &afrom &6{player}'
    percent: '&aPercent: &6{amount}'
    failed: '&cThe payment could not be completed.'
  economy:
    usage: '&cPlease use &6/economy status&c, &6/economy set/add/remove <Amount>&c, or &6/economy set/add/remove <Amount> <PlayerName>&c!'
    status: '&aVault Enabled? : &6{enabled}'
    set-own: '&aYour money has been set to &6{amount}{currency}'
    set-other: '&aMoney from &6{player} &ahas been set to &6{amount}{currency}'
    add-own: '&aYour money increased by &6{amount}{currency}'
    add-other: '&aMoney from &6{player} &aincreased by &6{amount}{currency}'
    remove-own: '&aYour money decreased by &6{amount}{currency}'
    remove-other: '&aMoney from &6{player} &adecreased by &6{amount}{currency}'
