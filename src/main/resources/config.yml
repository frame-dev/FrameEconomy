Prefix: '&6[&aFrame&bEconomy&6] &c>> &7'

# MySQL Connection!
MySQL:
  Host: 'localhost'
  User: 'root'
  Password: 'password'
  Database: 'database'
  Port: 3306
  Use: false
SQLite:
  Path: 'plugins/FrameEconomy/money'
  FileName: 'database'
  Use: false
H2:
  Path: 'plugins/FrameEconomy/money'
  FileName: 'database'
  User: 'sa'
  Password: ''
  Use: false
FileStorage:
  # Available types: YML, JSON
  Type: 'YML'
  Path: 'plugins/FrameEconomy/money'
  FileName: 'eco'
MongoDB:
  Database: ' '
  User: ' '
  Password: ' '
  Host: ' '
  Port: 27017
  Localhost: false
  Normal: false
  Use: false
  CollectionName: 'frameeconomy_economy'
Currency:
  Plural: '$'
  Singular: '$'
Economy:
  MaxBalance: 1000000000
  MinBalance: 0

Messages:
  general:
    no-permission: '&cNo Permissions!'
    only-player: '&cOnly players can use this command!'
    player-not-found: '&cThis player is not online! &6{player}'
