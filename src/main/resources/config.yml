    withdraw-error: '&cError while withdrawing from bank &6{bank}&c!'
    add-member-success: '&6{player} &ais now a member of bank &6{bank}&a!'
    remove-member-success: '&6{player} &ais no longer a member of bank &6{bank}&a!'

