  bank:
    usage: '&cPlease use &6/bank create <Name>&c, &6/bank deposit <Name> <Amount>&c, &6/bank withdraw <Name> <Amount>&c, &6/bank addmember <Name> <PlayerName>&c, &6/bank removemember <Name> <PlayerName>&c, &6/bank balance <Name>&c, or &6/bank list&c!'
    list-border: '&6<<<===>>>'
    list-values: '&a{values}'
    list-empty: '&cNo banks found.'
    members-empty: '&cNo bank members found.'
    create-success: '&aBank &6{bank} &asuccessfully created!'
    create-error: '&cError while creating bank &6{bank}&c!'
    remove-success: '&cBank &6{bank} &csuccessfully deleted!'
    remove-error: '&cError while deleting bank &6{bank}&c!'
    balance: '&aThe balance from bank &6{bank} &ais &6{amount}{currency}'
    not-found: '&cBank &6{bank} &cdoes not exist!'
    not-member: '&cYou are not a bank member or the owner!'
    not-owner: '&cYou are not the bank owner!'
    not-enough-money: '&cThe bank does not have enough money!'
